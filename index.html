<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StayEase | Luxury Hotel Booking</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    >
</head>

<body>

<header>
    <div id="hotelContainer"></div>

    <div class="logo">
        <i class="fa-solid fa-hotel"></i>
        <span>StayEase</span>
    </div>

    <nav>

        <a href="index.html">Home</a>
        <a href="#hotels">Hotels</a>
        <a href="favorites.html">Favorites</a>

    </nav>

</header>


<section class="hero">

    <div class="overlay"></div>

    <div class="hero-content">

        <h1>Luxury Stays For Every Journey</h1>

        <p>
            Discover premium hotels from around the world at unbeatable prices.
        </p>

        <div class="search-box">

            <input
                type="text"
                id="searchInput"
                placeholder="Search hotel..."
            >

            <button id="searchBtn">

                <i class="fa-solid fa-magnifying-glass"></i>

            </button>

        </div>

    </div>

</section>


<section id="hotels" class="hotel-section">

    <div class="section-title">

        <h2>Featured Hotels</h2>

        <p>Luxury stays selected just for you.</p>

    </div>

    <div id="hotelContainer" class="hotel-grid">

    </div>

</section>


<footer>

    <p>

        ©️ 2026 StayEase. All Rights Reserved.

    </p>

</footer>

<script src="js/script.js"></script>

</body>
</html>
